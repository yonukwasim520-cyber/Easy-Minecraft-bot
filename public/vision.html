<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vision Fix</title>
</head>

<body style="background:black; color:white;">

<h2>VISION DEBUG</h2>

<div id="out"></div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io()

// 👇 هذا أهم سطر لازم يكون موجود
socket.on('vision', (pixels) => {

  console.log("VISION RECEIVED:", pixels)

  if (!pixels) {
    document.getElementById("out").innerText = "NO DATA"
    return
  }

  let html = ""

  for (let y = 0; y < pixels.length; y++) {
    for (let x = 0; x < pixels[y].length; x++) {

      html += `<span style="color:${pixels[y][x]}">8</span>`
    }
    html += "<br>"
  }

  document.getElementById("out").innerHTML = html
})

</script>

</body>
</html>
